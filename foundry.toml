[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = false

[rpc_endpoints]
citrea_mainnet = "https://rpc.citrea.xyz"
citrea_testnet = "https://rpc.testnet.citrea.xyz"

[etherscan]
citrea_mainnet = { key = "${CITREA_EXPLORER_KEY}", chain = 4114, url = "https://explorer.citrea.xyz/api" }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
